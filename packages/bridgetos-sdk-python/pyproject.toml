[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bridgetos"
version = "0.1.0"
description = "Python client for BridgetOS — runtime behavioral identity monitoring for AI agents"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "BridgetOS"}]
keywords = ["ai", "agents", "governance", "drift", "identity", "monitoring"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "httpx>=0.25.0",
  "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0.0",
  "pytest-asyncio>=0.21.0",
  "pytest-cov>=4.0.0",
  "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://bridgetos.com"
Repository = "https://github.com/bridgetos-labs/bridgetos-oss"
Documentation = "https://docs.bridgetos.com"

[tool.hatch.build.targets.wheel]
packages = ["src/bridgetos"]
