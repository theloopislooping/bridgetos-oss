[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bridgetos-langchain"
version = "0.1.0"
description = "LangChain integration for BridgetOS — automatic observation emission for LangChain agents"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "BridgetOS"}]
dependencies = [
  "bridgetos>=0.1.0",
  "langchain-core>=0.3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0.0",
  "pytest-cov>=4.0.0",
  "ruff>=0.1.0",
  "langchain>=0.3.0",
]

[tool.uv.sources]
bridgetos = { path = "../bridgetos-sdk-python", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/bridgetos_langchain"]
